<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <!-- Paper background -->
  <rect width="800" height="300" fill="#F8F4EE" rx="4"/>

  <!-- Ground hill - wobbly line -->
  <path d="M0 260 Q80 250 160 255 Q280 245 400 250 Q520 242 640 248 Q720 252 800 255 L800 300 L0 300 Z" fill="none" stroke="#B8B0A0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M0 260 Q80 250 160 255 Q280 245 400 250 Q520 242 640 248 Q720 252 800 255 L800 300 L0 300 Z" fill="#F0EDE6" opacity="0.4"/>

  <!-- Left sunflower 1 (bigger) -->
  <g transform="translate(110, 160)">
    <!-- Stem - wobbly -->
    <path d="M2 50 Q-1 65 3 80 Q0 90 2 95" stroke="#7B9E5A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <path d="M2 75 Q-12 68 -18 72 Q-10 78 2 75" fill="#8FB06A" stroke="#7B9E5A" stroke-width="1" stroke-linecap="round"/>
    <!-- Petals - irregular -->
    <path d="M0 -8 Q-3 -22 1 -26 Q4 -22 2 -8" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M7 -5 Q16 -16 20 -12 Q16 -6 7 -3" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M8 3 Q22 0 23 5 Q20 9 8 6" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M6 9 Q16 18 12 22 Q8 18 4 10" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-1 10 Q-3 24 1 26 Q5 22 2 10" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-6 8 Q-18 16 -20 12 Q-16 6 -6 5" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-8 1 Q-22 2 -23 -3 Q-19 -7 -8 -2" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-6 -6 Q-16 -16 -12 -20 Q-7 -15 -4 -6" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <!-- Center -->
    <circle cx="0" cy="1" r="9" fill="#8B6E3E" stroke="#6B5030" stroke-width="1"/>
    <circle cx="-2" cy="-1" r="1.5" fill="#6B5030" opacity="0.4"/>
    <circle cx="3" cy="2" r="1.2" fill="#6B5030" opacity="0.4"/>
    <circle cx="-1" cy="4" r="1" fill="#6B5030" opacity="0.3"/>
  </g>

  <!-- Left sunflower 2 (smaller) -->
  <g transform="translate(155, 185) scale(0.7)">
    <path d="M0 45 Q2 58 -1 72 Q1 80 0 85" stroke="#7B9E5A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M0 60 Q10 55 15 58 Q9 63 0 60" fill="#8FB06A" stroke="#7B9E5A" stroke-width="1"/>
    <path d="M0 -7 Q-2 -20 1 -23 Q4 -19 2 -7" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M6 -4 Q14 -13 17 -9 Q14 -4 6 -2" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M7 3 Q18 1 19 5 Q16 8 7 5" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M5 8 Q12 16 9 19 Q5 15 3 8" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-1 9 Q-2 21 1 22 Q4 19 2 9" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-6 6 Q-15 12 -17 8 Q-13 4 -6 4" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-7 -1 Q-19 0 -19 -4 Q-15 -6 -7 -3" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-5 -5 Q-12 -14 -9 -17 Q-5 -12 -3 -5" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <circle cx="0" cy="1" r="8" fill="#8B6E3E" stroke="#6B5030" stroke-width="1"/>
  </g>

  <!-- Right sunflower -->
  <g transform="translate(680, 170)">
    <path d="M-1 48 Q2 62 0 78 Q-2 88 1 93" stroke="#7B9E5A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0 68 Q-11 62 -16 66 Q-9 71 0 68" fill="#8FB06A" stroke="#7B9E5A" stroke-width="1"/>
    <path d="M0 -7 Q-2 -21 2 -24 Q5 -20 2 -7" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M6 -4 Q15 -14 18 -10 Q14 -5 6 -2" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M7 3 Q20 1 21 5 Q17 9 7 5" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M5 9 Q14 18 10 21 Q6 16 3 9" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-2 10 Q-3 23 1 25 Q5 21 2 10" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-7 6 Q-17 13 -19 9 Q-15 4 -7 4" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-8 -1 Q-21 1 -22 -3 Q-17 -7 -8 -3" fill="#ECCC50" stroke="#D4B840" stroke-width="0.8"/>
    <path d="M-5 -6 Q-14 -15 -10 -19 Q-6 -14 -4 -6" fill="#F0D060" stroke="#D4B840" stroke-width="0.8"/>
    <circle cx="0" cy="1" r="9" fill="#8B6E3E" stroke="#6B5030" stroke-width="1"/>
    <circle cx="2" cy="-1" r="1.3" fill="#6B5030" opacity="0.4"/>
    <circle cx="-2" cy="3" r="1" fill="#6B5030" opacity="0.3"/>
  </g>

  <!-- Sun - sketchy circle with face -->
  <g transform="translate(670, 65)">
    <!-- Rays - irregular scratchy lines -->
    <g stroke="#D4B840" stroke-width="1.8" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="-42" x2="2" y2="-55"/>
      <line x1="30" y1="-28" x2="40" y2="-38"/>
      <line x1="42" y1="2" x2="55" y2="0"/>
      <line x1="30" y1="30" x2="38" y2="40"/>
      <line x1="-2" y1="42" x2="0" y2="54"/>
      <line x1="-30" y1="28" x2="-39" y2="38"/>
      <line x1="-42" y1="-2" x2="-54" y2="0"/>
      <line x1="-28" y1="-30" x2="-37" y2="-39"/>
    </g>
    <!-- Sun body - slightly wobbly -->
    <path d="M0 -32 Q18 -34 30 -18 Q36 -4 32 10 Q28 26 12 32 Q-4 36 -18 30 Q-32 22 -34 6 Q-36 -10 -26 -24 Q-16 -34 0 -32 Z" fill="#F5E47A" stroke="#C8B44A" stroke-width="1.5"/>
    <!-- Face -->
    <circle cx="-9" cy="-6" r="3" fill="#9E8840"/>
    <circle cx="10" cy="-6" r="3" fill="#9E8840"/>
    <path d="M-7 6 Q0 14 8 6" stroke="#9E8840" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Cloud left -->
  <g transform="translate(100, 55)" stroke="#C0B8A8" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M0 15 Q-2 5 10 2 Q18 -5 30 0 Q38 -8 50 -2 Q60 -5 65 5 Q70 12 60 16 Q50 20 35 18 Q20 22 10 18 Q2 20 0 15 Z"/>
  </g>

  <!-- Cloud right-center -->
  <g transform="translate(440, 40)" stroke="#C0B8A8" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M0 12 Q2 4 12 2 Q20 -4 28 0 Q34 -5 42 -1 Q50 2 48 10 Q46 16 36 15 Q24 18 14 15 Q4 17 0 12 Z"/>
  </g>

  <!-- Sparkle stars - small 4-point stars -->
  <g fill="#D4B840" opacity="0.7">
    <!-- star 1 -->
    <path d="M250 60 L252 55 L254 60 L259 62 L254 64 L252 69 L250 64 L245 62 Z" stroke="#C8A830" stroke-width="0.5"/>
    <!-- star 2 -->
    <path d="M350 45 L351 42 L352 45 L355 46 L352 47 L351 50 L350 47 L347 46 Z" stroke="#C8A830" stroke-width="0.5"/>
    <!-- star 3 -->
    <path d="M300 85 L301.5 81 L303 85 L307 86.5 L303 88 L301.5 92 L300 88 L296 86.5 Z" stroke="#C8A830" stroke-width="0.5"/>
    <!-- star 4 (tiny) -->
    <path d="M500 55 L501 53 L502 55 L504 56 L502 57 L501 59 L500 57 L498 56 Z" stroke="#C8A830" stroke-width="0.5"/>
    <!-- star 5 -->
    <path d="M200 90 L201 88 L202 90 L204 91 L202 92 L201 94 L200 92 L198 91 Z" stroke="#C8A830" stroke-width="0.5"/>
    <!-- star 6 (tiny) -->
    <path d="M430 75 L431 73 L432 75 L434 76 L432 77 L431 79 L430 77 L428 76 Z" stroke="#C8A830" stroke-width="0.5"/>
    <!-- plus sparkle -->
    <g stroke="#C0B8A8" stroke-width="0.8" opacity="0.5">
      <line x1="375" y1="65" x2="375" y2="71"/>
      <line x1="372" y1="68" x2="378" y2="68"/>
    </g>
    <g stroke="#C0B8A8" stroke-width="0.8" opacity="0.4">
      <line x1="530" y1="78" x2="530" y2="83"/>
      <line x1="527.5" y1="80.5" x2="532.5" y2="80.5"/>
    </g>
  </g>

  <!-- Squirrel - simpler, sketchier -->
  <g transform="translate(580, 200)">
    <!-- Tail - big swoopy -->
    <path d="M18 -12 Q40 -50 35 -30 Q50 -48 32 -15 Q42 -30 22 0" fill="#C49470" stroke="#9E7050" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M-5 20 Q-16 10 -14 -5 Q-12 -16 0 -18 Q12 -18 16 -8 Q20 2 18 15 Q15 25 5 28 Q-5 28 -5 20 Z" fill="#C49470" stroke="#9E7050" stroke-width="1.2"/>
    <!-- Belly -->
    <path d="M-2 22 Q-8 12 -6 2 Q-2 -6 4 -4 Q10 -2 12 8 Q13 18 8 24 Q2 26 -2 22 Z" fill="#E8D4B8" stroke="none"/>
    <!-- Head -->
    <path d="M-10 -18 Q-14 -30 -4 -36 Q6 -40 14 -34 Q20 -26 16 -18 Q10 -12 0 -12 Q-8 -12 -10 -18 Z" fill="#C49470" stroke="#9E7050" stroke-width="1.2"/>
    <!-- Ears -->
    <path d="M-6 -34 Q-10 -42 -5 -44 Q-1 -42 -4 -34" fill="#C49470" stroke="#9E7050" stroke-width="1"/>
    <path d="M-5 -37 Q-7 -40 -4 -41 Q-2 -39 -4 -36" fill="#E8D4B8" stroke="none"/>
    <path d="M8 -36 Q6 -44 10 -45 Q14 -42 12 -35" fill="#C49470" stroke="#9E7050" stroke-width="1"/>
    <path d="M9 -38 Q8 -42 11 -42 Q13 -40 11 -37" fill="#E8D4B8" stroke="none"/>
    <!-- Eyes -->
    <circle cx="-2" cy="-26" r="2.5" fill="#3D2B1A"/>
    <circle cx="8" cy="-26" r="2.5" fill="#3D2B1A"/>
    <circle cx="-1" cy="-27" r="0.8" fill="white"/>
    <circle cx="9" cy="-27" r="0.8" fill="white"/>
    <!-- Nose -->
    <circle cx="3" cy="-21" r="1.8" fill="#3D2B1A"/>
    <!-- Mouth -->
    <path d="M1 -19 Q3 -16 5 -19" stroke="#3D2B1A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    <!-- Paws -->
    <ellipse cx="-2" cy="28" rx="4" ry="2.5" fill="#B08460" stroke="#9E7050" stroke-width="0.8"/>
    <ellipse cx="8" cy="28" rx="4" ry="2.5" fill="#B08460" stroke="#9E7050" stroke-width="0.8"/>
    <!-- Acorn -->
    <path d="M1 26 Q-1 24 1 22 Q5 22 7 24 Q5 26 3 27 Z" fill="#8B6E3E" stroke="#6B5030" stroke-width="0.8"/>
    <ellipse cx="3.5" cy="29" rx="3.5" ry="4" fill="#B08840" stroke="#8B6E3E" stroke-width="0.8"/>
    <line x1="3.5" y1="21" x2="3.5" y2="22.5" stroke="#6B5030" stroke-width="1"/>
  </g>

  <!-- Main text - hand-drawn style -->
  <text x="370" y="155" text-anchor="middle" font-family="'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive" font-size="52" fill="#D48B9B" letter-spacing="4" opacity="0.85">
    ashley ha
  </text>
</svg>
